<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة العميل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2430;
    --accent: #e8a045;
    --accent2: #f0c070;
    --danger: #e05252;
    --safe: #3db87a;
    --text: #e8eaf0;
    --text-dim: #7a8299;
    --text-muted: #404660;
    --milk: #60aaff;
    --egg: #f5c842;
    --fish: #3ec9c9;
    --gluten: #c97b3e;
    --sesame: #b87adb;
    --nut: #e07b3a;
    --soya: #5abf6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(232,160,69,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(96,170,255,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
